<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Панель сотрудника — UrbanFox</title>
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ============================================================
           ПЕРЕМЕННЫЕ
           ============================================================ */
        :root {
            --bg-primary: #f0f4f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a2634;
            --text-secondary: #4a5f7a;
            --text-muted: #6a7f9a;
            --border-color: #e8edf5;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 16px 48px rgba(0, 119, 190, 0.08);
            --gradient: linear-gradient(135deg, #0077be, #5b3cc4);
        }

        [data-theme="dark"] {
            --bg-primary: #0a0e17;
            --bg-secondary: #111820;
            --bg-card: #1a2430;
            --text-primary: #e8edf5;
            --text-secondary: #a0b4cc;
            --text-muted: #6a7f9a;
            --border-color: #2a3a5c;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 16px 48px rgba(0, 119, 190, 0.15);
        }

        /* ============================================================
           ОБЩИЕ СТИЛИ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.4s ease, color 0.4s ease;
            min-height: 100vh;
        }

        /* ============================================================
           СТРАНИЦА ВХОДА
           ============================================================ */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
            transition: background 0.4s ease;
        }

        .login-box {
            background: var(--bg-card);
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.4s ease;
        }

        .login-box .logo-text {
            font-size: 30px;
            font-weight: 800;
            background: linear-gradient(135deg, #0077be, #5b3cc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-box .logo-text img {
            height: 40px;
            width: auto;
        }

        .login-box .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 6px 0 28px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 14px;
        }

        .login-box input:focus {
            border-color: #0077be;
            box-shadow: 0 0 0 4px rgba(0, 119, 190, 0.06);
        }

        .login-box .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0077be, #5b3cc4);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 119, 190, 0.3);
        }

        .login-box .error-msg {
            color: #dc3545;
            font-size: 14px;
            min-height: 28px;
            margin-top: 8px;
        }

        .login-box .back-link {
            display: inline-block;
            margin-top: 14px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .login-box .back-link:hover {
            color: #0077be;
        }

        /* ============================================================
           ПАНЕЛЬ УПРАВЛЕНИЯ
           ============================================================ */
        .admin-panel {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-panel.active {
            display: block;
        }

        /* ===== ШАПКА ===== */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .admin-header .logo-text {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #0077be, #5b3cc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-header .logo-text img {
            height: 35px;
            width: auto;
        }

        .admin-header .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .admin-header .header-actions .btn-icon {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-secondary);
            transition: all 0.3s;
            background: var(--bg-card);
        }

        .admin-header .header-actions .btn-icon:hover {
            border-color: #0077be;
            color: #0077be;
        }

        .admin-header .logout-btn {
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .admin-header .logout-btn:hover {
            background: #c82333;
            transform: scale(1.02);
        }

        /* ===== СТАТИСТИКА ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px 24px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: #0077be;
            box-shadow: var(--shadow-hover);
        }

        .stat-card .stat-number {
            font-size: 34px;
            font-weight: 800;
            color: #0077be;
            line-height: 1.2;
        }

        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-card .stat-icon {
            font-size: 28px;
            margin-bottom: 6px;
            display: block;
        }

        /* ===== ТАБЛИЦА ===== */
        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .table-toolbar .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            max-width: 400px;
        }

        .table-toolbar .search-box input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .table-toolbar .search-box input:focus {
            border-color: #0077be;
            box-shadow: 0 0 0 4px rgba(0, 119, 190, 0.06);
        }

        .table-toolbar .search-box input::placeholder {
            color: var(--text-muted);
        }

        .table-toolbar .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .table-toolbar .filter-group select,
        .table-toolbar .filter-group input[type="date"] {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }

        .table-toolbar .filter-group select:focus,
        .table-toolbar .filter-group input[type="date"]:focus {
            border-color: #0077be;
        }

        .table-wrap {
            overflow-x: auto;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 750px;
        }

        .table-wrap table th {
            background: linear-gradient(135deg, #0077be, #5b3cc4);
            color: #fff;
            padding: 14px 16px;
            text-align: left;
            font-weight: 700;
            font-size: 13px;
            white-space: nowrap;
        }

        .table-wrap table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
            vertical-align: middle;
        }

        .table-wrap table tr:hover td {
            background: rgba(0, 119, 190, 0.02);
        }

        .table-wrap table tr:last-child td {
            border-bottom: none;
        }

        .no-bookings {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 15px;
        }

        /* ===== СТАТУСЫ ===== */
        .status-select {
            padding: 4px 10px;
            border-radius: 20px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-card);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
            min-width: 110px;
            color: var(--text-primary);
        }

        .status-select:focus {
            border-color: #0077be;
        }

        .status-select option {
            padding: 4px 8px;
        }

        /* ===== КНОПКИ В ТАБЛИЦЕ ===== */
        .delete-btn {
            background: rgba(220, 53, 69, 0.08);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.15);
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #dc3545;
            color: #fff;
        }

        /* ===== ПАРАМЕТРЫ АКБ ===== */
        .battery-info {
            font-size: 12px;
            line-height: 1.4;
        }

        .battery-info strong {
            color: var(--text-primary);
        }

        .battery-info .battery-price {
            color: #0077be;
            font-weight: 700;
        }

        .battery-info .battery-meta {
            color: var(--text-muted);
        }

        /* ===== ПОДВАЛ ===== */
        .admin-footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 20px 0 10px;
            border-top: 1px solid var(--border-color);
            margin-top: 25px;
        }

        /* ===== TOAST ===== */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0077be;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0, 119, 190, 0.3);
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .toast-notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (max-width: 700px) {
            .login-box {
                padding: 30px 20px;
            }

            .admin-header {
                flex-direction: column;
                text-align: center;
            }

            .admin-header .header-actions {
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-card .stat-number {
                font-size: 26px;
            }

            .table-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .table-toolbar .search-box {
                max-width: 100%;
            }

            .table-toolbar .filter-group {
                justify-content: stretch;
            }

            .table-toolbar .filter-group select,
            .table-toolbar .filter-group input[type="date"] {
                flex: 1;
            }

            .table-wrap table {
                font-size: 12px;
                min-width: 600px;
            }

            .table-wrap table th,
            .table-wrap table td {
                padding: 8px 10px;
            }

            .status-select {
                font-size: 11px;
                min-width: 90px;
                padding: 2px 6px;
            }
        }

        @media (max-width: 450px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== СТРАНИЦА ВХОДА ===== -->
    <div class="login-page" id="loginPage">
        <div class="login-box" id="loginBox">
            <div class="logo-text">
                <img src="logo.png" alt="UrbanFox" />
                UrbanFox
            </div>
            <p class="subtitle">🔐 Вход для сотрудников</p>

            <input type="password" id="adminPassword" placeholder="Введите пароль" />
            <button class="btn" id="adminLoginBtn">Войти</button>
            <div class="error-msg" id="adminError"></div>
            <a href="index.html" class="back-link">← На главную</a>
        </div>
    </div>

    <!-- ===== ПАНЕЛЬ УПРАВЛЕНИЯ ===== -->
    <div class="admin-panel" id="adminPanel">

        <!-- Шапка -->
        <div class="admin-header">
            <div class="logo-text">
                <img src="logo.png" alt="UrbanFox" />
                UrbanFox
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="refreshBtn" title="Обновить данные">🔄</button>
                <button class="btn-icon" id="exportBtn" title="Экспорт в Excel">📥</button>
                <button class="btn-icon" id="themeToggle" title="Сменить тему">🌙</button>
                <button class="logout-btn" id="adminLogoutBtn">🚪 Выйти</button>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <span class="stat-icon">📋</span>
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Всего записей</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">📅</span>
                <div class="stat-number" id="statToday">0</div>
                <div class="stat-label">За сегодня</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">📊</span>
                <div class="stat-number" id="statWeek">0</div>
                <div class="stat-label">За 7 дней</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">📈</span>
                <div class="stat-number" id="statMonth">0</div>
                <div class="stat-label">За 30 дней</div>
            </div>
        </div>

        <!-- Таблица -->
        <div class="table-toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по имени или телефону..." />
            </div>
            <div class="filter-group">
                <select id="filterWorkshop">
                    <option value="">Все мастерские</option>
                    <option value="Ново-Астраханское">Ново-Астраханское</option>
                    <option value="Овражный">Овражный</option>
                </select>
                <input type="date" id="filterDate" />
                <button class="btn-icon" id="clearFilterBtn" title="Сбросить фильтры">✕</button>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Клиент</th>
                        <th>Телефон</th>
                        <th>Мастерская</th>
                        <th>Дата</th>
                        <th>Время</th>
                        <th>🔋 АКБ</th>
                        <th>Статус</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody id="bookingsList">
                    <tr><td colspan="8" class="no-bookings">📭 Загрузка...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="admin-footer">
            💾 Данные хранятся в облачной базе Supabase &bull; Обновлено: <span id="lastUpdate">—</span>
        </div>
    </div>

    <script>
        // ================================================================
        //  ПОДКЛЮЧЕНИЕ К SUPABASE
        // ================================================================
        const SUPABASE_URL = 'https://egomebwghpjudrbnfpbe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnb21lYndnaHBqdWRyYm5mcGJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjEzMjYsImV4cCI6MjA5ODM5NzMyNn0.mPWK_8C8A5JZQzt48Oh0hMkxW5JeZYHiiHZRSbm3uNg';

        const ADMIN_PASSWORD = 'admin123';

        // ================================================================
        //  ПЕРЕМЕННЫЕ
        // ================================================================
        let allBookings = [];
        let filteredBookings = [];

        // ================================================================
        //  ЗАГРУЗКА ЗАПИСЕЙ
        // ================================================================
        async function loadBookings() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/bookings?select=*`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                if (!response.ok) throw new Error('Ошибка загрузки');
                const data = await response.json();
                allBookings = data;
                filteredBookings = [...allBookings];
                renderStats();
                renderTable();
                updateLastUpdate();
                return data;
            } catch (error) {
                console.error('❌ Ошибка загрузки:', error);
                document.getElementById('bookingsList').innerHTML =
                    `<tr><td colspan="8" class="no-bookings">❌ Ошибка загрузки данных</td></tr>`;
                return [];
            }
        }

        // ================================================================
        //  СТАТИСТИКА
        // ================================================================
        function renderStats() {
            const today = new Date().toISOString().split('T')[0];
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const monthAgo = new Date();
            monthAgo.setDate(monthAgo.getDate() - 30);

            const total = allBookings.length;
            const todayCount = allBookings.filter(b => b.date === today).length;
            const weekCount = allBookings.filter(b => b.date >= weekAgo.toISOString().split('T')[0]).length;
            const monthCount = allBookings.filter(b => b.date >= monthAgo.toISOString().split('T')[0]).length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statToday').textContent = todayCount;
            document.getElementById('statWeek').textContent = weekCount;
            document.getElementById('statMonth').textContent = monthCount;
        }

        // ================================================================
        //  ОБНОВЛЕНИЕ ВРЕМЕНИ
        // ================================================================
        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent =
                now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // ================================================================
        //  ТАБЛИЦА
        // ================================================================
        function renderTable() {
            const tbody = document.getElementById('bookingsList');

            if (filteredBookings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="no-bookings">📭 Нет записей</td></tr>`;
                return;
            }

            const sorted = [...filteredBookings].sort((a, b) => {
                return new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time);
            });

            const statusOptions = [
                { value: 'new', label: '🆕 Новая' },
                { value: 'work', label: '🔧 В работе' },
                { value: 'done', label: '✅ Готово' }
            ];

            tbody.innerHTML = sorted.map(b => {
                let batteryHtml = '—';
                if (b.batteryvoltage || b.batterycapacity) {
                    batteryHtml = `
                        <div class="battery-info">
                            <strong>${b.batteryvoltage || '—'}</strong> / 
                            <strong>${b.batterycapacity || '—'}</strong><br>
                            <span class="battery-meta">${b.batterytype || '—'}</span><br>
                            <span class="battery-price">${b.batteryprice || '—'}</span>
                        </div>
                    `;
                }

                return `
                    <tr>
                        <td><strong>${b.name}</strong></td>
                        <td>${b.phone}</td>
                        <td>${b.workshop}</td>
                        <td>${b.date}</td>
                        <td>${b.time}</td>
                        <td>${batteryHtml}</td>
                        <td>
                            <select class="status-select" data-id="${b.id}">
                                ${statusOptions.map(s => `
                                    <option value="${s.value}" ${b.status === s.value ? 'selected' : ''}>
                                        ${s.label}
                                    </option>
                                `).join('')}
                            </select>
                        </td>
                        <td><button class="delete-btn" data-id="${b.id}">✕</button></td>
                    </tr>
                `;
            }).join('');

            // ===== Обработчики =====
            document.querySelectorAll('.status-select').forEach(select => {
                select.addEventListener('change', async function() {
                    const id = Number(this.dataset.id);
                    const newStatus = this.value;
                    await updateStatus(id, newStatus);
                    await loadBookings();
                    showToast('Статус обновлён');
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    if (confirm('Удалить запись?')) {
                        const id = Number(this.dataset.id);
                        await deleteBooking(id);
                        await loadBookings();
                        showToast('Запись удалена');
                    }
                });
            });
        }

        // ================================================================
        //  ОБНОВЛЕНИЕ СТАТУСА
        // ================================================================
        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });
                if (!response.ok) throw new Error('Ошибка обновления');
                return true;
            } catch (error) {
                console.error('Ошибка обновления статуса:', error);
                return false;
            }
        }

        // ================================================================
        //  УДАЛЕНИЕ ЗАПИСИ
        // ================================================================
        async function deleteBooking(id) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                if (!response.ok) throw new Error('Ошибка удаления');
                return true;
            } catch (error) {
                console.error('Ошибка удаления записи:', error);
                return false;
            }
        }

        // ================================================================
        //  ФИЛЬТРАЦИЯ
        // ================================================================
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const workshop = document.getElementById('filterWorkshop').value;
            const date = document.getElementById('filterDate').value;

            filteredBookings = allBookings.filter(b => {
                let match = true;

                if (search) {
                    const nameMatch = b.name.toLowerCase().includes(search);
                    const phoneMatch = b.phone.includes(search);
                    if (!nameMatch && !phoneMatch) match = false;
                }

                if (workshop && b.workshop !== workshop) match = false;
                if (date && b.date !== date) match = false;

                return match;
            });

            renderTable();
        }

        // ================================================================
        //  ЭКСПОРТ В CSV
        // ================================================================
        function exportToCSV() {
            if (allBookings.length === 0) {
                showToast('Нет данных для экспорта');
                return;
            }

            const headers = ['Клиент', 'Телефон', 'Мастерская', 'Дата', 'Время', 'АКБ', 'Цена', 'Статус'];
            const rows = allBookings.map(b => [
                b.name,
                b.phone,
                b.workshop,
                b.date,
                b.time,
                b.batteryvoltage + ' / ' + b.batterycapacity + ' ' + b.batterytype || '—',
                b.batteryprice || '—',
                b.status === 'new' ? 'Новая' : b.status === 'work' ? 'В работе' : 'Готово'
            ]);

            const csvContent = [
                headers.join(';'),
                ...rows.map(row => row.join(';'))
            ].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Записи_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showToast('✅ CSV скачан');
        }

        // ================================================================
        //  TOAST-УВЕДОМЛЕНИЕ
        // ================================================================
        function showToast(message) {
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.textContent = '✅ ' + message;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        // ================================================================
        //  ТЁМНАЯ ТЕМА
        // ================================================================
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('adminTheme', next);
            document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
        }

        // ================================================================
        //  АВТОРИЗАЦИЯ
        // ================================================================
        document.getElementById('adminLoginBtn').addEventListener('click', function() {
            const password = document.getElementById('adminPassword').value;
            const errorEl = document.getElementById('adminError');

            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                loadBookings();
                errorEl.textContent = '';
            } else {
                errorEl.textContent = '❌ Неверный пароль! Попробуйте снова.';
            }
        });

        document.getElementById('adminPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('adminLoginBtn').click();
        });

        document.getElementById('adminLogoutBtn').addEventListener('click', function() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminError').textContent = '';
        });

        // ================================================================
        //  СОБЫТИЯ
        // ================================================================
        document.getElementById('refreshBtn').addEventListener('click', function() {
            loadBookings();
            showToast('Данные обновлены');
        });

        document.getElementById('exportBtn').addEventListener('click', exportToCSV);

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('filterWorkshop').addEventListener('change', applyFilters);
        document.getElementById('filterDate').addEventListener('change', applyFilters);
        document.getElementById('clearFilterBtn').addEventListener('click', function() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterWorkshop').value = '';
            document.getElementById('filterDate').value = '';
            applyFilters();
            showToast('Фильтры сброшены');
        });

        // ================================================================
        //  ВОССТАНОВЛЕНИЕ ТЕМЫ
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('adminTheme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
                document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
            }
        });
    </script>

</body>
</html>
